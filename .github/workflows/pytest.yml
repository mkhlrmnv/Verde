name: Run Pytest

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest

  build_and_push_image:
    name: Build and Push Image
    runs-on: ubuntu-latest
    needs: test
    env:
      DOCKERHUB_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE }}
      APP_IMAGE_NAME: ${{ vars.APP_IMAGE_NAME }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Docker Hub configuration
        run: |
          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ]; then
            echo "DOCKERHUB_USERNAME secret is required."
            exit 1
          fi
          if [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "DOCKERHUB_TOKEN secret is required."
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate Docker to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Derive image metadata
        id: meta
        run: |
          IMAGE_OWNER="${DOCKERHUB_NAMESPACE:-${{ secrets.DOCKERHUB_USERNAME }}}"
          if [ -z "${IMAGE_OWNER}" ]; then
            echo "Image namespace is empty. Set vars.DOCKERHUB_NAMESPACE or secrets.DOCKERHUB_USERNAME."
            exit 1
          fi
          IMAGE_OWNER="$(echo "${IMAGE_OWNER}" | tr '[:upper:]' '[:lower:]')"
          IMAGE_NAME="${APP_IMAGE_NAME:-${GITHUB_REPOSITORY##*/}}"
          IMAGE_NAME="$(echo "${IMAGE_NAME}" | tr '[:upper:]' '[:lower:]')"
          echo "image=${IMAGE_OWNER}/${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.sha_tag }}
