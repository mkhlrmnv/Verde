name: Run Pytest

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest

  build_and_push_image:
    name: Build and Push Image
    runs-on: ubuntu-latest
    needs: test
    env:
      ACR_AUTH_MODE: ${{ vars.ACR_AUTH_MODE || 'oidc' }}
      ACR_LOGIN_SERVER: ${{ vars.ACR_LOGIN_SERVER }}
      APP_IMAGE_NAME: ${{ vars.APP_IMAGE_NAME }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate registry configuration
        run: |
          if [ -z "${ACR_LOGIN_SERVER}" ]; then
            echo "ACR_LOGIN_SERVER is required (for example: myregistry.azurecr.io)."
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure (OIDC)
        if: env.ACR_AUTH_MODE == 'oidc'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Authenticate Docker to ACR (OIDC)
        if: env.ACR_AUTH_MODE == 'oidc'
        run: |
          ACR_NAME="${ACR_LOGIN_SERVER%%.*}"
          az acr login --name "${ACR_NAME}"

      - name: Authenticate Docker to ACR (username/password fallback)
        if: env.ACR_AUTH_MODE != 'oidc'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Derive image metadata
        id: meta
        run: |
          IMAGE_NAME="${APP_IMAGE_NAME:-${GITHUB_REPOSITORY##*/}}"
          IMAGE_NAME="$(echo "${IMAGE_NAME}" | tr '[:upper:]' '[:lower:]')"
          echo "image=${ACR_LOGIN_SERVER}/${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.sha_tag }}
